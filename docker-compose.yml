services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-outbox-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 2s
      timeout: 2s
      retries: 30
  redis:
    image: redis:7-alpine
    container_name: ledger-outbox-redis
    ports:
      - "6379:6379"
    command: redis-server --loglevel warning
